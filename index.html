<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>TV Online</title>

<script src="channels.js"></script>

<style>
body{
background:#000;
color:white;
font-family:Arial;
margin:0;
}

.container{
display:flex;
height:80vh;
}

.sidebar{
width:250px;
background:#111;
padding:10px;
}

.channel{
padding:10px;
border-bottom:1px solid #333;
cursor:pointer;
}

.channel:hover{
background:#222;
}

.player{
flex:1;
background:#000;
}

iframe{
width:100%;
height:100%;
border:none;
}

.programacion{
padding:10px;
background:#111;
}
</style>

</head>

<body>

<div class="container">

<div class="sidebar" id="canales"></div>

<div class="player">
<iframe id="visor"></iframe>
</div>

</div>

<div class="programacion">
PROGRAMACIÓN
</div>

<script>
const contenedor = document.getElementById("canales");
const visor = document.getElementById("visor");

canales.forEach((c, i) => {
  const div = document.createElement("div");
  div.className = "channel";
  div.innerText = c.nombre;

  div.onclick = () => {
    visor.src = "tv.html?ch=" + i;
  };

  contenedor.appendChild(div);
});
</script>

</body>
</html>
